version: 2.1

jobs:
  verify:
    docker:
      - image: cimg/node:24.16
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Typecheck
          command: npm run typecheck
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Build
          command: npm run build
          environment:
            NODE_ENV: production
            NEXT_PUBLIC_ENABLE_METICULOUS_RECORDER: "1"
            NEXT_PUBLIC_METICULOUS_DETERMINISTIC: "1"
            NEXT_PUBLIC_METICULOUS_SIMULATED_DATE: "Fri, 17 May 2024 13:35:20 GMT"
      - run:
          name: Prepare companion assets
          command: |
            mkdir -p companion-assets/_next
            cp -r .next/static companion-assets/_next/
            ls -la companion-assets
            ls -la companion-assets/_next/static | head
      - store_artifacts:
          path: companion-assets
          destination: companion-assets

  deploy-production-marker:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
          name: Plan Vercel production deployment marker
          command: |
            circleci run release plan vercel-production \
              --environment-name=production \
              --component-name=mokserevamp \
              --target-version="${CIRCLE_SHA1:0:7}"
      - run:
          name: Mark Vercel production deployment as running
          command: circleci run release update vercel-production --status=running
      - run:
          name: Record Vercel deployment handoff
          command: |
            echo "Production deployment is handled by Vercel from the main branch."
            echo "CircleCI records this marker after verify passes on main."
      - run:
          name: Mark Vercel production deployment as successful
          command: circleci run release update vercel-production --status=SUCCESS
          when: on_success
      - run:
          name: Mark Vercel production deployment as failed
          command: |
            circleci run release update vercel-production \
              --status=FAILED \
              --failure-reason="CircleCI production deployment marker job failed."
          when: on_fail

workflows:
  verify:
    jobs:
      - verify:
          filters:
            branches:
              only:
                - dev-test
                - main
      - deploy-production-marker:
          requires:
            - verify
          filters:
            branches:
              only:
                - main
