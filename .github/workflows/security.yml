name: Security Checks

on:
  push:
    branches: ["main", "dev-test"]
  pull_request:
    branches: ["main", "dev-test"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit high severity gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit high severity vulnerabilities
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  secret-scan:
    name: Static secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for committed secret patterns
        run: |
          set -euo pipefail
          pattern='(notion_secret_|secret_[A-Za-z0-9]{16,}|github_pat_|ghp_[A-Za-z0-9]{36,}|sk-[A-Za-z0-9]{20,}|ctx7sk-|xox[baprs]-|AKIA[0-9A-Z]{16})'
          if git grep -n -E "$pattern" -- . ':!package-lock.json' ':!.github/workflows/security.yml'; then
            echo "Potential secret pattern found in tracked source."
            exit 1
          fi
